<section id="certifications" class="success">
    <div class="container">
        <div class="row">
            <div class="col-lg-12 text-center">
                <h2>Certifications</h2>
                <hr class="star-light">
            </div>
        </div>
        <div class="row">
            {% for cert in site.certifications %}
            <div class="col-sm-4 portfolio-item" style="margin-bottom: 40px; text-align: center;">
                <img src="{{ cert.image }}" class="img-responsive" alt="{{ cert.title }}" style="max-width: 100%; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); margin: 0 auto;">
                <h4 style="margin-top: 20px; color: white;">{{ cert.title }}</h4>
            </div>
            {% endfor %}
        </div>
    </div>
</section>
